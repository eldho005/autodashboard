    <!-- Authentication Guard (server-side JWT verification) -->

    <div id="app-root" class="w-full max-w-[1400px] space-y-4">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // --- Load Data from Auto Dashboard ---
        function loadAutoDashboardData() {
            try {
                // Load stored driver data
                const savedDrivers = localStorage.getItem('autoDashboardDrivers');
                const savedLead = localStorage.getItem('autoDashboardOriginalLead');
                
                let drivers = [];
                let leadInfo = {};
                
                if (savedDrivers) {
                    drivers = JSON.parse(savedDrivers);
                    console.log('✅ Loaded drivers from localStorage:', drivers);
                    // Debug: Log driver 0's city and postal
                    if (drivers[0]) {
                        console.log('   - drv0.personalCity:', drivers[0].personalCity);
                        console.log('   - drv0.personalPostalCode:', drivers[0].personalPostalCode);
                        console.log('   - drv0.licRenewal (Effective):', drivers[0].licRenewal);
                    }
                }
                
                if (savedLead) {
                    leadInfo = JSON.parse(savedLead);
                    console.log('✅ Loaded lead info from localStorage:', leadInfo);
                    console.log('   - city:', leadInfo.city);
                    console.log('   - postal:', leadInfo.postal);
                }
                
                // Parse URL params as fallback
                const urlParams = new URLSearchParams(window.location.search);
                const urlName = urlParams.get('name') || '';
                const urlPhone = urlParams.get('phone') || '';
                const urlEmail = urlParams.get('email') || '';
                
                // Merge lead info with complete fields
                // City and Postal come from Auto Dashboard manual entry (personalCity, personalPostalCode)
                // They are also synced to originalLead.city and originalLead.postal
                leadInfo = {
                    name: leadInfo.name || urlName,
                    phone: leadInfo.phone || urlPhone,
                    email: leadInfo.email || urlEmail,
                    city: leadInfo.city || '',
                    postal: leadInfo.postal || '',  // Changed from postalCode to postal (matches Auto Dashboard)
                    postalCode: leadInfo.postal || leadInfo.postalCode || '',  // Fallback support
                    homePhone: leadInfo.homePhone || '',
                    effectiveDate: leadInfo.effectiveDate || '',
                    maritalStatus: leadInfo.maritalStatus || '',
                    gender: leadInfo.gender || ''
                };
                
                console.log('📋 Final leadInfo:', leadInfo);
                console.log('   ✅ City from Auto Dashboard:', leadInfo.city);
                console.log('   ✅ Postal from Auto Dashboard:', leadInfo.postal);
                return { drivers, leadInfo };
            } catch (e) {
                console.error('❌ Error loading data:', e);
                return { drivers: [], leadInfo: {} };
            }
        }
        
        // --- Sanitize Value (show "-" for missing data) + HTML escape (XSS prevention) ---
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }
        function sanitize(value) {
            if (value === null || value === undefined || value === '' || (typeof value === 'string' && value.trim() === '')) {
                return '-';
            }
            return escapeHtml(value.toString().trim());
        }
        
        // --- Parse Name into First/Middle/Last ---
        function parseName(fullName) {
            if (!fullName || fullName.trim() === '') {
                return { first: '-', middle: '-', last: '-' };
            }
            
            // Handle comma-separated names from DASH PDF (e.g., "PATEL,MEHUL,SHASHIKAN")
            let parts;
            if (fullName.includes(',')) {
                // Split by comma and clean up spaces
                parts = fullName.split(',').map(p => p.trim()).filter(p => p.length > 0);
            } else {
                // Split by spaces for normal names
                parts = fullName.trim().split(/\s+/);
            }
            
            if (parts.length === 0) {
                return { first: '-', middle: '-', last: '-' };
            } else if (parts.length === 1) {
                return { first: parts[0], middle: '-', last: '-' };
            } else if (parts.length === 2) {
                return { first: parts[0], middle: '-', last: parts[1] };
            } else {
                // For 3+ parts: first is first name, last is last part, everything in between is middle
                return { first: parts[0], middle: parts.slice(1, -1).join(' '), last: parts[parts.length - 1] };
            }
        }
        
        // --- Get Lead-Specific Property Storage Key ---
        function getPropertyStorageKey() {
            try {
                const savedLead = localStorage.getItem('autoDashboardOriginalLead');
                if (savedLead) {
                    const lead = JSON.parse(savedLead);
                    // Use leadId, or fallback to email as unique identifier
                    const leadId = lead.leadId || lead.email || 'default';
                    return `propertyData_${leadId}`;
                }
            } catch (e) {
                console.warn('⚠️ Failed to get lead ID for property storage:', e);
            }
            return 'propertyData_default';
        }
        
        // --- Load Property Data from Property Page ---
        function loadPropertyData() {
            try {
                const storageKey = getPropertyStorageKey();
                const savedProperty = localStorage.getItem(storageKey);
                if (savedProperty) {
                    const data = JSON.parse(savedProperty);
                    console.log(`✅ Loaded property data from localStorage (key: ${storageKey}):`, data);
                    
                    // V2 FORMAT: Redesigned property page format
                    // {userType, primaryType, customer, primaryProperty, rentalProperties}
                    if (data.userType && data.primaryProperty) {
                        console.log('📋 Detected V2 property format from redesigned page');
                        return { ...data, isV2: true };
                    }
                    
                    // NEW FORMAT: data.properties is an array with each property having its own customer object
                    if (data.properties && Array.isArray(data.properties)) {
                        return data; // Return entire structure {properties: [...], currPropIdx, viewMode}
                    }
                    
                    // OLD FORMAT: single property object (backward compatibility)
                    return data;
                }
                return {};
            } catch (e) {
                console.error('❌ Error loading property data:', e);
                return {};
            }
        }
        
        // --- Populate RAW_DATA from Auto Dashboard ---
        function populateDataFromAutoDashboard() {
            const { drivers, leadInfo } = loadAutoDashboardData();
            const propData = loadPropertyData();
            
            // Parse lead name
            const nameParts = parseName(leadInfo.name);
            
            // SECTION 1: CLIENT DETAILS - Pull from Personal Information fields of driver[0]
            const drv0 = drivers[0];
            
            // Names: prefer separate name fields from Personal Information form
            if (drv0?.personalFirstName) RAW_DATA.customers[0]["First Name"] = sanitize(drv0.personalFirstName);
            else if (nameParts.first && nameParts.first !== '-') RAW_DATA.customers[0]["First Name"] = sanitize(nameParts.first);
            
            if (drv0?.personalMiddleName) RAW_DATA.customers[0]["Middle Name"] = sanitize(drv0.personalMiddleName);
            else if (nameParts.middle && nameParts.middle !== '-') RAW_DATA.customers[0]["Middle Name"] = sanitize(nameParts.middle);
            
            if (drv0?.personalLastName) RAW_DATA.customers[0]["Last Name"] = sanitize(drv0.personalLastName);
            else if (nameParts.last && nameParts.last !== '-') RAW_DATA.customers[0]["Last Name"] = sanitize(nameParts.last);
            
            if (drv0?.personalAddress) RAW_DATA.customers[0]["Address"] = sanitize(drv0.personalAddress);
            
            // ✅ CITY: Pull from Auto Dashboard (drv0.personalCity) - ALWAYS set from driver data
            const cityValue = drv0?.personalCity || leadInfo.city || '';
            RAW_DATA.customers[0]["City"] = sanitize(cityValue);
            console.log('📍 Mapped City to Client Details:', cityValue);
            
            // ✅ POSTAL: Pull from Auto Dashboard (drv0.personalPostalCode) - ALWAYS set from driver data
            const postalValue = drv0?.personalPostalCode || leadInfo.postal || leadInfo.postalCode || '';
            RAW_DATA.customers[0]["Postal Code"] = sanitize(postalValue);
            console.log('📮 Mapped Postal Code to Client Details:', postalValue);
            
            if (drv0?.personalMobile || leadInfo.phone) RAW_DATA.customers[0]["Mobile"] = sanitize(drv0?.personalMobile || leadInfo.phone);
            if (drv0?.personalEmail || leadInfo.email) RAW_DATA.customers[0]["Email"] = sanitize(drv0?.personalEmail || leadInfo.email);
            if (leadInfo.homePhone || drv0?.personalHomePhone) RAW_DATA.customers[0]["Home Phone"] = sanitize(leadInfo.homePhone || drv0?.personalHomePhone);
            
            // ✅ EFFECTIVE DATE: Pull from drv0.licRenewal (Renewal Date in Driver & Licensing section)
            const effectiveDateValue = drv0?.licRenewal || leadInfo.effectiveDate || '';
            RAW_DATA.customers[0]["Effective Date"] = sanitize(effectiveDateValue);
            console.log('📅 Mapped Effective Date from Renewal Date:', effectiveDateValue);
            
            if (drv0?.personalGender) RAW_DATA.customers[0]["Gender"] = sanitize(drv0.personalGender);
            if (drv0?.personalMaritalStatus) RAW_DATA.customers[0]["Marital Status"] = sanitize(drv0.personalMaritalStatus);

            
            // SECTION 3-6: ALL DRIVERS DATA (loop through all drivers)
            drivers.forEach((drv, driverIndex) => {
                // Ensure driver slot exists in RAW_DATA
                if (!RAW_DATA.customers[0].drivers[driverIndex]) {
                    RAW_DATA.customers[0].drivers[driverIndex] = { claims: [], convictions: [], lapses: [], vehicles: [] };
                }
                
                if (drv) {
                    // Use driver's separate name fields first (same logic as Personal Information card)
                    // Priority: personalFirstName/Middle/Last → fallback to parsing full name
                    const driverName = drv.personalName || drv.drvName || (driverIndex === 0 ? leadInfo.name : '') || '';
                    const driverNameParts = parseName(driverName);
                    
                    // First Name: prefer personalFirstName field
                    if (drv.personalFirstName) RAW_DATA.customers[0].drivers[driverIndex]["First Name"] = sanitize(drv.personalFirstName);
                    else if (driverNameParts.first) RAW_DATA.customers[0].drivers[driverIndex]["First Name"] = sanitize(driverNameParts.first);
                    
                    // Middle Name: prefer personalMiddleName field
                    if (drv.personalMiddleName) RAW_DATA.customers[0].drivers[driverIndex]["Middle Name"] = sanitize(drv.personalMiddleName);
                    else if (driverNameParts.middle) RAW_DATA.customers[0].drivers[driverIndex]["Middle Name"] = sanitize(driverNameParts.middle);
                    
                    // Last Name: prefer personalLastName field
                    if (drv.personalLastName) RAW_DATA.customers[0].drivers[driverIndex]["Last Name"] = sanitize(drv.personalLastName);
                    else if (driverNameParts.last) RAW_DATA.customers[0].drivers[driverIndex]["Last Name"] = sanitize(driverNameParts.last);
                    
                    if (drv.mainRel) RAW_DATA.customers[0].drivers[driverIndex]["Relationship"] = sanitize(drv.mainRel);
                    if (drv.personalMaritalStatus) RAW_DATA.customers[0].drivers[driverIndex]["Marital Status"] = sanitize(drv.personalMaritalStatus);
                    if (drv.licNumber) RAW_DATA.customers[0].drivers[driverIndex]["Licence Number"] = sanitize(drv.licNumber);
                    if (drv.personalGender) RAW_DATA.customers[0].drivers[driverIndex]["Gender"] = sanitize(drv.personalGender);
                    if (drv.personalDob) RAW_DATA.customers[0].drivers[driverIndex]["Date of Birth"] = sanitize(drv.personalDob);
                    if (drv.expGDate || drv.expGDate_base) RAW_DATA.customers[0].drivers[driverIndex]["G Date"] = sanitize(drv.expGDate || drv.expGDate_base);
                    if (drv.expG2Date || drv.expG2Date_base) RAW_DATA.customers[0].drivers[driverIndex]["G2 Date"] = sanitize(drv.expG2Date || drv.expG2Date_base);
                    if (drv.expG1Date || drv.expG1Date_base) RAW_DATA.customers[0].drivers[driverIndex]["G1 Date"] = sanitize(drv.expG1Date || drv.expG1Date_base);
                    if (drv.drvContIns) RAW_DATA.customers[0].drivers[driverIndex]["Cont Insurance Date"] = sanitize(drv.drvContIns);
                    if (drv.drvInsSince) RAW_DATA.customers[0].drivers[driverIndex]["Company Insured"] = sanitize(drv.drvInsSince);
                    
                    // CLAIMS
                    if (drv.claims && drv.claims.length > 0) {
                        RAW_DATA.customers[0].drivers[driverIndex].claims = drv.claims.map(claim => {
                            // Show only Applied Description, no company name fallback
                            const claimType = claim.appliedDescription || '';
                            return {
                                "Claim Date": sanitize(claim.date),
                                "Claim Type": sanitize(claimType),
                                "At Fault": sanitize(claim.fault === 'No' ? 'No' : (claim.fault === 'Yes' ? 'Yes' : claim.fault)),
                                "TPBI": sanitize(claim.tpbi),
                                "TPPD": sanitize(claim.tppd),
                                "AB": sanitize(claim.ab),
                                "COL": sanitize(claim.coll),
                                "Other": sanitize(claim.otherpd)
                            };
                        });
                    } else {
                        RAW_DATA.customers[0].drivers[driverIndex].claims = [];
                    }
                    
                    // CONVICTIONS
                    if (drv.convictionsList && drv.convictionsList.length > 0) {
                        RAW_DATA.customers[0].drivers[driverIndex].convictions = drv.convictionsList.map(conv => {
                            // Get the selected reason - check both fields
                            const selectedReason = conv.reason || conv.selectedReason || '';
                            console.log(`📋 Conviction: ${conv.description} → Reason: "${selectedReason}"`);
                            return {
                                "Date": sanitize(conv.date),
                                "Description": sanitize(conv.description),
                                "Speed over the limit": sanitize(drv.mvrSpeed || ''),
                                "Selected Reason": sanitize(selectedReason)
                            };
                        });
                    } else {
                        RAW_DATA.customers[0].drivers[driverIndex].convictions = [];
                    }
                    
                    // VEHICLES (per driver)
                    if (drv.vehicles && drv.vehicles.length > 0) {
                        RAW_DATA.customers[0].drivers[driverIndex].vehicles = drv.vehicles.map(veh => ({
                            "VIN": sanitize(veh.vin || veh.VIN),
                            "Vehicle Condition": sanitize(veh.condition || veh["Vehicle Condition"]),
                            "Leased": sanitize(veh.financing || veh.Leased),
                            "Purchase Date": sanitize(veh.purchaseDate || veh["Purchase Date"]),
                            "KM at Purchase": sanitize(veh.purchaseKm || veh["KM at Purchase"]),
                            "Parking at night": sanitize(veh.parkingNight || veh["Parking at night"]),
                            "Annually": sanitize(veh.annualKm || veh.Annually),
                            "Business": sanitize(veh.use === 'Business' ? 'Yes' : (veh.Business || 'No')),
                            "Winter Tires": sanitize(veh.winterTires || veh["Winter Tires"])
                        }));
                    } else {
                        RAW_DATA.customers[0].drivers[driverIndex].vehicles = [];
                    }
                    
                    // LAPSES
                    if (drv.lapses && drv.lapses.length > 0) {
                        RAW_DATA.customers[0].drivers[driverIndex].lapses = drv.lapses.map((lapse, lapseIdx) => {
                            const reason = sanitize(lapse.reason || lapse.Reason || lapse.gapCalculation || lapse["Gap Calculation"] || '');
                            console.log(`  [Lapse ${lapseIdx}] Reason in Final Review: "${reason}"`);
                            return {
                                "Lapse Date": sanitize(lapse["Lapse Date"] || lapse.lapseDate || lapse["Date"] || lapse.date || ''),
                                "Reinstated": sanitize(lapse.reinstatedDate || lapse.Reinstated || lapse.reinstated || lapse["Reinstated Date"] || ''),
                                "Reason": reason  // ✅ DROPDOWN SELECTED REASON
                            };
                        });
                        console.log(`📋 Loaded ${drv.lapses.length} lapse record(s) for Driver ${driverIndex + 1} with selected reason(s)`);
                    } else {
                        RAW_DATA.customers[0].drivers[driverIndex].lapses = [];
                    }
                } else {
                    // Show dashes if no driver
                    RAW_DATA.customers[0].drivers[driverIndex]["First Name"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Middle Name"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Last Name"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Relationship"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Marital Status"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Licence Number"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Gender"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Date of Birth"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["G Date"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["G2 Date"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["G1 Date"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Cont Insurance Date"] = "-";
                    RAW_DATA.customers[0].drivers[driverIndex]["Company Insured"] = "-";
                }
            });
            
            // PROPERTY DATA SECTIONS (from property.html)
            // Handle V2 FORMAT: From redesigned property page
            if (propData.isV2 && propData.primaryProperty) {
                console.log('📋 Processing V2 property format from redesigned page');
                
                const v2Customer = propData.customer || {};
                const primaryProp = propData.primaryProperty || {};
                const rentals = propData.rentalProperties || [];
                
                // Determine Property Type based on userType and primaryType
                let propertyType = 'Homeowner';
                if (propData.userType === 'tenant') {
                    propertyType = 'Tenant';
                } else if (propData.userType === 'homeowner') {
                    if (propData.primaryType === 'condo') {
                        propertyType = 'Condominium';
                    } else {
                        propertyType = 'Homeowner';
                    }
                }
                RAW_DATA.customers[0].viewMode = propData.userType === 'tenant' ? 'Tenants' : 'Homeowners';
                console.log('🔍 Set viewMode:', RAW_DATA.customers[0].viewMode);
                console.log('🏠 Property Type:', propertyType);
                
                // Map V2 customer fields
                RAW_DATA.customers[0]["Insured DOB"] = sanitize(v2Customer.insDob || "");
                RAW_DATA.customers[0]["Insured Gender"] = sanitize(v2Customer.insGender || "");
                RAW_DATA.customers[0]["Co-Insured DOB"] = sanitize(v2Customer.coDob || "");
                RAW_DATA.customers[0]["Co-Insured Gender"] = sanitize(v2Customer.coGender || "");
                RAW_DATA.customers[0]["Co Insured DOB"] = sanitize(v2Customer.coDob || "");
                RAW_DATA.customers[0]["Co Insured Gender"] = sanitize(v2Customer.coGender || "");
                
                // Map V2 primary property fields
                RAW_DATA.customers[0]["Property Address"] = sanitize(primaryProp.address || "");
                RAW_DATA.customers[0]["City"] = sanitize(primaryProp.city || "");
                RAW_DATA.customers[0]["Postal Code"] = sanitize(primaryProp.postal || "");
                RAW_DATA.customers[0]["Property Type"] = propertyType;
                RAW_DATA.customers[0]["Insured Since"] = sanitize(primaryProp.insuredSince || "");
                RAW_DATA.customers[0]["Structure"] = sanitize(primaryProp.structureType || "");
                RAW_DATA.customers[0]["Construction"] = sanitize(primaryProp.construction || "");
                RAW_DATA.customers[0]["Exterior Finish"] = sanitize(primaryProp.exteriorFinish || "");
                RAW_DATA.customers[0]["Stories"] = sanitize(primaryProp.storeys || "");
                RAW_DATA.customers[0]["Total Living Area"] = sanitize(primaryProp.livingArea || "");
                RAW_DATA.customers[0]["Full Bath"] = sanitize(primaryProp.fullBaths || "");
                RAW_DATA.customers[0]["Half Bath"] = sanitize(primaryProp.halfBaths || "");
                RAW_DATA.customers[0]["Number of Cars"] = sanitize(primaryProp.numberOfCars || "");
                RAW_DATA.customers[0]["Basement Area"] = sanitize(primaryProp.basementArea || "");
                RAW_DATA.customers[0]["Basement % Finished"] = sanitize(primaryProp.basementFinished || "");
                
                // Map V2 mechanical systems
                RAW_DATA.customers[0]["Elec Year"] = sanitize(primaryProp.elecYear || "");
                RAW_DATA.customers[0]["Plumb Year"] = sanitize(primaryProp.plumbYear || "");
                RAW_DATA.customers[0]["Water Heater Year"] = sanitize(primaryProp.tankYear || "");
                RAW_DATA.customers[0]["Roof Year"] = sanitize(primaryProp.roofYear || "");
                RAW_DATA.customers[0]["Heat Year"] = sanitize(primaryProp.heatYear || "");
                
                // Build properties array (primary + rentals) for display and export
                RAW_DATA.customers[0].properties = [{
                    "Property Type": propertyType,
                    "Insured DOB": sanitize(v2Customer.insDob || ""),
                    "Insured Gender": sanitize(v2Customer.insGender || ""),
                    "Co-Insured DOB": sanitize(v2Customer.coDob || ""),
                    "Co-Insured Gender": sanitize(v2Customer.coGender || ""),
                    "Insured Since": sanitize(primaryProp.insuredSince || ""),
                    "Customer Address": sanitize(primaryProp.address || ""),
                    "City": sanitize(primaryProp.city || ""),
                    "Postal": sanitize(primaryProp.postal || ""),
                    "Construction": sanitize(primaryProp.construction || ""),
                    "Exterior Finish": sanitize(primaryProp.exteriorFinish || ""),
                    "Structure": sanitize(primaryProp.structureType || ""),
                    "structureType": sanitize(primaryProp.structureType || ""),
                    "Stories": sanitize(primaryProp.storeys || ""),
                    "Total Living Area": sanitize(primaryProp.livingArea || ""),
                    "Full Bath": sanitize(primaryProp.fullBaths || ""),
                    "Half Bath": sanitize(primaryProp.halfBaths || ""),
                    "Number of Cars": sanitize(primaryProp.numberOfCars || ""),
                    "Basement Area": sanitize(primaryProp.basementArea || ""),
                    "Basement Finished": sanitize(primaryProp.basementFinished || ""),
                    "Electrical Year": sanitize(primaryProp.elecYear || ""),
                    "Plumbing Year": sanitize(primaryProp.plumbYear || ""),
                    "Tank Year": sanitize(primaryProp.tankYear || ""),
                    "Roofing Year": sanitize(primaryProp.roofYear || ""),
                    "Heating Year": sanitize(primaryProp.heatYear || "")
                }];
                
                // Add rental properties if any
                rentals.forEach((rental, idx) => {
                    const rentalType = rental.type === 'rental-house' ? 'Rental Dwelling' : 'Rented Condo';
                    RAW_DATA.customers[0].properties.push({
                        "Property Type": rentalType,
                        "Rental Address": sanitize(rental.address || ""),
                        "Rental Postal": sanitize(rental.postal || ""),
                        "City": sanitize(rental.city || ""),
                        "Construction": sanitize(rental.construction || ""),
                        "Exterior Finish": sanitize(rental.exteriorFinish || ""),
                        "Structure": sanitize(rental.structureType || ""),
                        "structureType": sanitize(rental.structureType || ""),
                        "Stories": sanitize(rental.storeys || ""),
                        "Total Living Area": sanitize(rental.livingArea || ""),
                        "Full Bath": sanitize(rental.fullBaths || ""),
                        "Half Bath": sanitize(rental.halfBaths || ""),
                        "Number of Cars": sanitize(rental.numberOfCars || ""),

        // --- Event Handlers ---
        function saveEditedDataToLocalStorage() {
            try {
                // Map of display labels to property field keys
                const fieldMapping = {
                    "Insured DOB": "insDob",
                    "Gender": "insGender",
                    "Co-Insured DOB": "coDob",
                    "Co-Insured Gender": "coGender",
                    "Insured Since": "insuredSince",
                    "Address": "address",
                    "Stories": "storeys",
                    "Mortgages": "mortgageCount",
                    "First Time Buyer": "firstTimeBuyer",
                    "Construction": "construction",
                    "Exterior Finish": "exteriorFinish",
                    "Structure": "structure",
                    "Living Area": "livingArea",
                    "Full Bath": "fullBaths",
                    "Half Bath": "halfBaths",
                    "Basement Area": "bsmtArea",
                    "Basement % Finished": "bsmtFin",
                    "Inlaw Suite": "sepEntrance",
                    "Elec Year": "elecYear",
                    "Plumb Year": "plumbYear",
                    "Water Heater Year": "tankYear",
                    "Roof Year": "roofYear",
                    "Roof Type": "roofType",
                    "Roof Slope": "roofSlope",
                    "Heat Year": "heatYear",

                    "Garage": "garage",
                    "Number of Cars": "numberOfCars",
                    "First Name": "name",
                    "City": "city",
                    "Postal": "postal",
                    "Insured Name": "insName",
                    "Co-Insured Name": "coInsName",
                    "Home Phone": "phone",
                    "Date of Birth": "dob",
                    "Total Living Area": "livingArea",
                    "% Finished": "bsmtFin"
                };

                // Get all input values from the DOM - Find span with label text, not label element
                const inputs = document.querySelectorAll('input[type="text"]');
                const editedValues = {};

                inputs.forEach(input => {
                    // Look for the span with the label text in the same container div
                    const container = input.closest('div.flex.items-baseline');
                    if (container) {
                        const labelSpan = container.querySelector('span.text-slate-500');
                        if (labelSpan) {
                            // Extract label text and remove the trailing colon
                            let labelText = labelSpan.textContent.trim();
                            if (labelText.endsWith(':')) {
                                labelText = labelText.slice(0, -1);
                            }
                            editedValues[labelText] = input.value || '';
                            console.log(`📝 Captured: "${labelText}" = "${input.value}"`);
                        }
                    }
                });

                console.log('📋 All edited values captured:', Object.keys(editedValues).length, 'fields');

                // Update localStorage property data
                const storageKey = getPropertyStorageKey();
                const propData = JSON.parse(localStorage.getItem(storageKey) || '{}');
                if (propData.properties && propData.properties[0]) {
                    const primaryProp = propData.properties[0];
                    const propCustomer = primaryProp.customer || {};

                    // Update fields using the mapping
                    let updateCount = 0;
                    Object.entries(editedValues).forEach(([labelText, value]) => {
                        const fieldKey = fieldMapping[labelText];
                        if (fieldKey) {
                            // Update in property object
                            if (fieldKey === 'name' || fieldKey === 'address' || fieldKey === 'city' || fieldKey === 'postal' || fieldKey === 'phone' || fieldKey === 'dob') {
                                propCustomer[fieldKey] = value;
                            } else {
                                primaryProp[fieldKey] = value;
                            }
                            // Update RAW_DATA
                            RAW_DATA.customers[0][labelText] = value;
                            console.log(`💾 Updated: "${labelText}" → "${value}"`);
                            updateCount++;
                        }
                    });

                    // Save back to localStorage
                    localStorage.setItem(storageKey, JSON.stringify(propData));
                    console.log(`✅ Edited data saved to localStorage (${updateCount} fields updated, key: ${storageKey})`);
                }
            } catch (error) {
                console.error('❌ Error saving edited data:', error);
            }
        }

        function refreshData() {
            // Reload property data from localStorage
            populateDataFromAutoDashboard();
            renderApp();
            
            // Show feedback
            const btn = event?.target?.closest('button');
            if (btn) {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> Refreshed!';
                lucide.createIcons();
                setTimeout(() => {

            }

        // Helper function to format dates and clean data
        function cleanExportValue(value) {
            if (!value) return "";
            // Convert to string if not already
            const strVal = String(value).trim();
            // Remove dashes
            if (strVal === "-") return "";
            // Remove "Select" dropdown placeholders (Select Reason, Select Description, etc.)
            if (strVal.toLowerCase().startsWith("select ")) return "";
            // Remove any remaining dashes from non-date fields
            return strVal.replace(/^-$/, "");
        }

        function cleanPhoneNumber(value) {
            if (!value) return "";
            // Convert to string and remove all special characters, leaving only digits
            return String(value).replace(/[^0-9]/g, "");
        }

        function formatDateForExport(dateStr) {
            if (!dateStr || dateStr === "-" || dateStr.trim() === "") return "";
            const cleaned = dateStr.trim();
            // Format MM/DD/YYYY to MMDDYYYY
            if (cleaned.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                return cleaned.replace(/\//g, "");
            }
            // Format MM-DD-YYYY to MMDDYYYY
            if (cleaned.match(/^\d{2}-\d{2}-\d{4}$/)) {
                return cleaned.replace(/-/g, "");
            }
            return cleaned;
        }

        // Helper to read values from rendered inputs on the page
        function getRenderedDriverValues(driverIndex) {
            const driverInputs = document.querySelectorAll(`input[disabled], input:not([disabled])`);
            const values = {};
            
            // Find all inputs in the driver section and extract their values
            const allInputs = document.querySelectorAll('input[type="text"]');
            let driverSectionCount = 0;
            let currentDriverIndex = -1;
            
            allInputs.forEach((input, idx) => {
                const value = input.value || '';
                // Try to match field names from labels nearby
                const label = input.parentElement?.parentElement?.querySelector('label');
                if (label) {
                    const fieldName = label.textContent.trim();
                    if (fieldName && !fieldName.includes('VIN')) {
                        values[fieldName] = value;
                    }
                }
            });
            
            return values;
        }
