<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Cover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc;
        }
        
        .streamlit-container {
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
            display: block;
        }
        
        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease-out;
        }
        
        .iframe-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #0369a1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0%  { transform: rotate(0deg); }
            100%{ transform: rotate(360deg); }
        }
    </style>
    <script>
        function togglePagesMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('pagesMenu');
            menu.classList.toggle('hidden');
        }
        
        document.addEventListener('click', function(event) {
            const menu = document.getElementById('pagesMenu');
            if (menu && !menu.classList.contains('hidden')) {
                menu.classList.add('hidden');
            }
        });
    </script>
</head>
<body>
    <!-- Authentication Guard (server-side JWT verification) -->
    <script>(async function(){try{const r=await fetch('/api/verify-token',{credentials:'include'});if(!r.ok)throw 0}catch(e){sessionStorage.removeItem('metaDashboardAuth');sessionStorage.removeItem('metaDashboardUser');window.location.href='meta-login.html'}})()</script>

    <!-- Header with Navigation -->
    <div class="bg-white border-b border-slate-200 shadow-sm">
        <!-- Breadcrumb Bar -->
        <div class="px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-slate-800">Home Cover</h1>
                <p class="text-xs text-slate-500 mt-0.5">AI-powered home &amp; condo coverage summary with PDF export</p>
            </div>
            <div class="flex items-center gap-3">
                <!-- Previous Page Button -->
                <a href="property-coverpage-temp.html" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 hover:border-slate-400 transition-colors">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                    <span>Auto Cover</span>
                </a>
                <div class="h-4 w-px bg-slate-300"></div>
                <!-- Pages Menu Dropdown -->
                <div class="relative">
                    <button onclick="togglePagesMenu(event)" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 hover:border-slate-400 transition-colors">
                        <i class="fa-solid fa-bars text-slate-500"></i>
                        <span>Pages</span>
                        <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                    </button>
                    <div id="pagesMenu" class="hidden absolute top-full left-0 mt-1 w-56 bg-white border border-slate-200 rounded-lg shadow-lg z-50 py-1">
                        <a href="meta dashboard.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Leads</a>
                        <a href="Auto dashboard.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Auto Dashboard</a>
                        <a href="property_redesigned.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Property</a>
                        <a href="final review page.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Review</a>
                        <a href="Powerbroker.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">PowerBroker</a>
                        <div class="border-t border-slate-200 my-1"></div>
                        <a href="property-coverpage-temp.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Auto Cover</a>
                        <a href="home-tenant-coverpage.html" class="block px-4 py-2 text-xs text-slate-900 bg-slate-100 font-semibold">Home Cover</a>
                        <a href="PAC form.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">PAC</a>
                        <a href="/document-upload-dashboard" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Doc Processing</a>
                        <a href="/signwell-ui" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">eSign</a>
                        <a href="/signed-documents" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50 transition-colors">Signed Docs</a>
                    </div>
                </div>
                <div class="h-4 w-px bg-slate-300"></div>
                <!-- Current Page -->
                <span class="text-xs font-semibold text-slate-800">Home Cover</span>
                <div class="h-4 w-px bg-slate-300"></div>
                <!-- Next Page Button -->
                <a href="PAC form.html" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 hover:border-slate-400 transition-colors">
                    <span>PAC</span>
                    <i class="fa-solid fa-arrow-right text-xs"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="iframe-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-slate-600 font-medium">Loading Streamlit App...</p>
            <p class="text-xs text-slate-400 mt-2">Starting server on port 8503</p>
        </div>
    </div>

    <!-- Streamlit App Container -->
    <div style="position: relative; width: 100%; height: calc(100vh - 126px);">
        <iframe
            id="streamlitFrame"
            src="about:blank"
            class="streamlit-container"
            onload="hideLoading()"
            onerror="showError()"
        ></iframe>
    </div>

    <script>
        // Fetch Streamlit URL from backend config (avoids hardcoded localhost)
        let STREAMLIT_BASE_URL = 'http://localhost:8503'; // fallback
        (async function initStreamlit() {
            try {
                const cfg = await fetch('/api/streamlit-config', { credentials: 'include' });
                if (cfg.ok) {
                    const data = await cfg.json();
                    STREAMLIT_BASE_URL = data.tenant_url || STREAMLIT_BASE_URL;
                }
            } catch (e) { /* use fallback */ }

            try {
                const frame = document.getElementById('streamlitFrame');
                const leadRaw = localStorage.getItem('autoDashboardOriginalLead');
                if (leadRaw) {
                    const lead = JSON.parse(leadRaw);
                    const params = new URLSearchParams();
                    if (lead.name) params.set('client_name', lead.name);
                    if (lead.email) params.set('client_email', lead.email);
                    if (lead.phone) params.set('client_phone', lead.phone);
                    if (lead.leadId) params.set('lead_id', lead.leadId);
                    const qs = params.toString();
                    frame.src = qs ? `${STREAMLIT_BASE_URL}?${qs}` : STREAMLIT_BASE_URL;
                    console.log('📋 Home Cover: Streamlit URL set to', frame.src);
                } else {
                    frame.src = STREAMLIT_BASE_URL;
                }
            } catch (e) {
                console.warn('⚠️ Could not initialise Streamlit iframe', e);
            }
        })();

        function hideLoading() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                overlay.classList.add('hidden');
            }, 500);
        }

        function showError() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.innerHTML = `
                <div class="text-center max-w-md px-6">
                    <div class="mb-4">
                        <i class="fa-solid fa-exclamation-triangle text-6xl text-amber-500"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">Streamlit Server Not Running</h3>
                    <p class="text-slate-600 mb-4">
                        The Streamlit application needs to be started before you can use this page.
                    </p>
                    <div class="bg-slate-100 rounded-lg p-4 mb-4 text-left">
                        <p class="text-xs font-mono text-slate-700 mb-2">
                            <strong>To start the server:</strong>
                        </p>
                        <p class="text-xs font-mono text-slate-600 mb-1">
                            1. Open a terminal / PowerShell
                        </p>
                        <p class="text-xs font-mono text-slate-600 mb-1">
                            2. Run: <code class="bg-white px-2 py-0.5 rounded">cd "c:\\Auto dashboard\\Auto dashboard"</code>
                        </p>
                        <p class="text-xs font-mono text-slate-600">
                            3. Run: <code class="bg-white px-2 py-0.5 rounded">python -m streamlit run home_tenant_coverpage_streamlit.py --server.port 8503</code>
                        </p>
                    </div>
                    <div class="flex gap-2 justify-center">
                        <a href="property-coverpage-temp.html" class="px-4 py-2 bg-slate-600 text-white rounded-md text-sm font-medium hover:bg-slate-700 transition-colors">
                            <i class="fa-solid fa-arrow-left mr-2"></i>
                            Back to Auto Cover
                        </a>
                        <button onclick="location.reload()" class="px-4 py-2 bg-sky-600 text-white rounded-md text-sm font-medium hover:bg-sky-700 transition-colors">
                            <i class="fa-solid fa-refresh mr-2"></i>
                            Retry
                        </button>
                    </div>
                </div>
            `;
        }

        async function checkStreamlitStatus() {
            try {
                await fetch(STREAMLIT_BASE_URL, { mode: 'no-cors' });
                console.log('✅ Streamlit server is running at', STREAMLIT_BASE_URL);
            } catch (error) {
                console.warn('⚠️ Streamlit server may not be running at', STREAMLIT_BASE_URL);
                setTimeout(() => {
                    const overlay = document.getElementById('loadingOverlay');
                    if (!overlay.classList.contains('hidden')) {
                        showError();
                    }
                }, 3000);
            }
        }

        checkStreamlitStatus();

        setInterval(() => {
            const frame = document.getElementById('streamlitFrame');
            if (frame && !frame.src) {
                checkStreamlitStatus();
            }
        }, 30000);
    </script>
</body>
</html>
