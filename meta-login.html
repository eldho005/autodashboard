<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Dashboard - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-8 text-center">
                <div class="w-20 h-20 bg-white rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-chart-line text-indigo-600 text-3xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">Meta Dashboard</h1>
                <p class="text-indigo-100 text-sm">Leads Management System</p>
            </div>

            <!-- Login Form -->
            <div class="p-8">
                <form id="loginForm" class="space-y-6">
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-envelope text-indigo-600 mr-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            placeholder="policy@meta.com"
                            required
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none text-gray-700"
                        >
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-lock text-indigo-600 mr-2"></i>Password
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                placeholder="Enter your password"
                                required
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none text-gray-700 pr-12"
                            >
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                            >
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-lg">
                        <div class="flex items-center">
                            <i class="fas fa-exclamation-circle text-red-500 mr-3"></i>
                            <p class="text-sm text-red-700 font-medium" id="errorText"></p>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="loginButton"
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg hover:shadow-xl flex items-center justify-center"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        <span id="buttonText">Sign In</span>
                    </button>
                </form>

                <!-- Info -->
                <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <p class="text-xs text-blue-700 text-center">
                        <i class="fas fa-info-circle mr-1"></i>
                        Secure access to Meta Leads Dashboard
                    </p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-gray-500 text-sm">
            <p>© 2026 Meta Dashboard. All rights reserved.</p>
        </div>
    </div>

    <script>
        // API base URL (same origin)
        const API_BASE = window.location.origin;

        // Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const loginButton = document.getElementById('loginButton');
        const buttonText = document.getElementById('buttonText');

        // Check if already logged in (via server-side token verification)
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(`${API_BASE}/api/verify-token`, { credentials: 'include' });
                if (res.ok) {
                    window.location.href = 'meta dashboard.html';
                }
            } catch (e) {
                // Not logged in, stay on login page
            }
        });

        // Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            
            if (type === 'text') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // Show Error Message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            
            // Shake animation
            errorMessage.classList.add('animate-shake');
            setTimeout(() => {
                errorMessage.classList.remove('animate-shake');
            }, 500);
        }

        // Hide Error Message
        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // Handle Form Submit — calls /api/login for server-side JWT auth
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            // Disable button during login
            loginButton.disabled = true;
            buttonText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Signing in...';

            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',   // Ensures the HTTP-only cookie is stored
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // Success
                    buttonText.innerHTML = '<i class="fas fa-check mr-2"></i>Success!';
                    loginButton.classList.remove('from-indigo-600', 'to-purple-600');
                    loginButton.classList.add('from-green-600', 'to-green-600');
                    
                    // Store display info in sessionStorage (for UI display only — auth is via cookie)
                    sessionStorage.setItem('metaDashboardAuth', 'true');
                    sessionStorage.setItem('metaDashboardUser', data.email || email);
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'meta dashboard.html';
                    }, 500);
                } else {
                    // Failed
                    loginButton.disabled = false;
                    buttonText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
                    showError(data.error || 'Invalid email or password. Please try again.');
                    
                    // Clear password field
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (err) {
                loginButton.disabled = false;
                buttonText.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Sign In';
                showError('Network error. Please check your connection and try again.');
                console.error('Login error:', err);
            }
        });

        // Clear error on input
        emailInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>
</body>
</html>
